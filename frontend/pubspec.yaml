name: roadwatch
description: A professional road issue reporting app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.1
  flutter_native_splash: ^2.4.4

  provider: ^6.1.2
  shimmer: ^3.0.0
  animations: ^2.0.11
  lottie: ^3.3.2

  http: ^1.2.1
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.4

  google_maps_flutter: ^2.7.0
  google_maps_flutter_android: ^2.6.1
  google_maps_flutter_platform_interface: ^2.4.1
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  image_picker: ^1.1.2

  pdf: ^3.10.4
  printing: ^5.12.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  google_api_headers: ^5.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/
